# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
spec:
  destination:
    namespace: argocd
    name: local-cluster
  sources:
    - path: cluster
      repoURL: https://git-codecommit.us-east-1.amazonaws.com/v1/repos/acme-director
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
